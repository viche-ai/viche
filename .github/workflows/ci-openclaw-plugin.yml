name: "CI: OpenClaw Plugin"

on:
  push:
    branches: [main]
    paths:
      - "channel/openclaw-plugin-viche/**"
  pull_request:
    paths:
      - "channel/openclaw-plugin-viche/**"

defaults:
  run:
    working-directory: channel/openclaw-plugin-viche

jobs:
  ci:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: channel/openclaw-plugin-viche/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
