# Self-hosting docker-compose for Viche.
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Generate a secret: mix phx.gen.secret (or openssl rand -base64 48)
#   3. docker compose -f docker-compose.prod.yml up -d
#
# The app runs migrations automatically on startup.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: viche_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    depends_on:
      - db
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    env_file:
      - .env
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/viche_prod
    restart: unless-stopped

volumes:
  postgres_data:
